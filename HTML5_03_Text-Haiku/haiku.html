<body>
<h1>Haiku</h1>
<h2>Using a &lt;p&gt; element</h2>
<p>Birds in concert,<br>
one sings above all others.<br>
I don't know its name.</p>
<p>&copy; Herman Van Rompuy</p>
<h2>Using the &lt;pre&gt; element</h2>
<pre>Birds in concert,
one sings above all others.
I don't know its name.</pre>
<p>&copy; Herman Van Rompuy</p>
</body>
